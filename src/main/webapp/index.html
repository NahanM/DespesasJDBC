<!DOCTYPE html>
<html lang="pt-br">

<!--Configuações-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Despesas</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado (sempre DEPOIS do Bootstrap) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!--Navbar -->
	<nav class="navbar navbar-expand-md">

	    <div class="container-fluid">

	        <!--Logo / Nome do sistema-->
	        <a class="navbar-brand" href="#">FinanceApp</a>

	        <!-- Botão hambúrguer (só aparece em telas pequenas) --> 
			<!--toggle = abre/fecha -->
	        <button
	            class="navbar-toggler"
	            type="button"
	            data-bs-toggle="collapse" 
	            data-bs-target="#menuNavbar"
	        >
	            <span class="navbar-toggler-icon"></span>
	        </button>

	        <!--Os links do menu -->
	        <div class="collapse navbar-collapse" id="menuNavbar"> <!--menu que abre e fecha-->
	            <ul class="navbar-nav w-100 justify-content-evenly">

	                <li class="nav-item"><!--cada item-->
	                    <a class="nav-link" href="#">Início</a>
	                </li>

	                <li class="nav-item">
	                    <a class="nav-link" href="#">Despesas</a>
	                </li>

	                <li class="nav-item">
	                    <a class="nav-link" href="#">Relatórios</a>
	                </li>

	            </ul>
	        </div>

	    </div>

	</nav>

    <!--Conteúdo principal -->
	<main>

	    <!-- Cards de resumo -->
	    <div class="container-fluid px-4 mt-4"> <!--100% da largura da tela-->
	        <div class="row g-3">

	            <!-- Card 1: Total de Despesas -->
	            <div class="col-md-4"><!--ocupa 4/12 colunas-->
	                <div class="card-resumo"> <!--lá do css - não usa bootstrap-->
	                    <span class="card-resumo-label">Total de Despesas</span>
	                    <span class="card-resumo-valor" id="totalDespesas">R$ 0,00</span>
	                </div>
	            </div>

	            <!-- Card 2: Quantidade de Lançamentos -->
	            <div class="col-md-4">
	                <div class="card-resumo">
	                    <span class="card-resumo-label">Lançamentos</span>
	                    <span class="card-resumo-valor" id="qtdLancamentos">0</span>
	                </div>
	            </div>

	            <!-- Card 3: Saldo Disponível -->
	            <div class="col-md-4">
	                <div class="card-resumo">
	                    <span class="card-resumo-label">Saldo Disponível</span>
	                    <span class="card-resumo-valor" id="saldoDisponivel">R$ 0,00</span>
	                </div>
	            </div>

	        </div>
	    </div>
		
		<!--Formulário de nova despesa -->
		<div class="container-fluid px-4 mt-4">

		    <!-- Botão que abre/fecha o formulário -->
		    <button
		        class="btn btn-nova-despesa mb-3"
		        data-bs-toggle="collapse"
		        data-bs-target="#formNovaDespesa"
		    >
		        + Nova Despesa
		    </button>

		    <!-- Formulário (começa escondido) -->
		    <div class="collapse" id="formNovaDespesa">
		        <div class="form-container mb-4"> <!--container customizado-->
		            <h6 class="form-titulo">Nova Despesa</h6>

		            <div class="row g-3">

		                <!-- Campo: Descrição -->
						<!--type=text = campo do texto-->
						<!--id = js-->
		                <div class="col-md-4">
		                    <label class="form-label" for="inputDescricao">Descrição</label>
		                    <input
		                        type="text"
		                        class="form-control" 
		                        id="inputDescricao"
		                        placeholder="Ex: Conta de luz"
		                    >
		                </div>

		                <!-- Campo: Valor -->
						<!-- step = casa decimal-->
		                <div class="col-md-2">
		                    <label class="form-label" for="inputValor">Valor (R$)</label>
		                    <input
		                        type="number"
		                        class="form-control"
		                        id="inputValor"
		                        placeholder="Ex: 150.00"
		                        step="0.01"
		                        min="0"
		                    >
		                </div>

		                <!-- Campo: Data -->
		                <div class="col-md-2">
		                    <label class="form-label" for="inputData">Data</label>
		                    <input
		                        type="date" 
		                        class="form-control"
		                        id="inputData"
		                    >
		                </div>

		                <!-- Campo: Categoria -->
		                <div class="col-md-2">
		                    <label class="form-label" for="inputCategoria">Categoria</label>
		                    <select class="form-select" id="inputCategoria">
		                    </select>
		                </div>

		                <!-- Botão Salvar -->
		                <div class="col-md-2 d-flex align-items-end">
		                    <button type="button" class="btn btn-salvar w-100" id="btnSalvar">
		                        Salvar
		                    </button>
		                </div>	

		            </div>
		        </div>
		    </div>

		</div>

		<!-- Tabela de despesas -->
		<div class="container-fluid px-4 mt-4"> <!--100% da tela-->
		    <div class="tabela-container"> <!--o css-->

		        <h6 class="tabela-titulo">Lançamentos</h6>

		        <table class="table" id="tabelaDespesas"> <!--class é do boot strap, e id pro js-->

		            <thead> <!--meu thead e th do css-->
		                <tr>
		                    <th>#</th>
		                    <th>Descrição</th>
		                    <th>Categoria</th>
		                    <th>Data</th>
		                    <th>Valor</th>
		                </tr>
		            </thead>

		            <tbody> <!--Sendo preenchido pelo JS-->

		            </tbody> 

		        </table>

		    </div>
		</div>
		
	</main>
 
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Seu JS personalizado (sempre DEPOIS do Bootstrap JS) -->
    <script src="js/app.js"></script>

</body>

</html>
